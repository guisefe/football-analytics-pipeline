name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install dbt-core==1.8.0 dbt-duckdb==1.8.4 duckdb==1.0.0 \
                      requests==2.31.0 pytest==8.2.0 pytest-cov==5.0.0 \
                      python-dotenv==1.0.1 sqlfluff==3.0.7

      - name: Run Python tests
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          DUCKDB_PATH: /tmp/test_warehouse.duckdb
        run: |
          pytest ingestion/tests/ -v --cov=ingestion --cov-report=xml

      - name: dbt debug
        env:
          DUCKDB_PATH: /tmp/test_warehouse.duckdb
        run: |
          cd dbt && dbt debug --profiles-dir .

      - name: Lint SQL with sqlfluff
        run: |
          sqlfluff lint dbt/models --dialect duckdb --format github-annotation \
          || true
